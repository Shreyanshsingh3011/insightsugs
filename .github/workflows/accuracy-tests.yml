name: Accuracy Pipeline Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Block merges: this workflow must pass. Configure as a required status
# check in GitHub branch protection rules for the default branch.
concurrency:
  group: accuracy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  accuracy:
    name: ETA + accuracy invariants
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run accuracy pipeline suite
        run: bun run test:accuracy

      - name: Run full vitest suite
        run: bun run test
