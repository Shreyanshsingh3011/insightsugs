name: Nightly Accuracy Pipeline

on:
  schedule:
    # 07:15 UTC every day — off-peak, results ready before EU/US morning.
    - cron: "15 7 * * *"
  workflow_dispatch: {}

concurrency:
  group: accuracy-nightly
  cancel-in-progress: false

jobs:
  nightly:
    name: Large-feed accuracy replay
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run nightly accuracy replay (1200-row mocked feed)
        run: bun run test:accuracy:nightly

      - name: Run standard accuracy suite
        run: bun run test:accuracy
